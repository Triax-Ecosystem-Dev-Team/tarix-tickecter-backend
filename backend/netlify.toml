[build]
  # Install dependencies and generate the Prisma client before deploy
  command = "npm install && npx prisma generate"
  # Path to serverless functions, relative to the base directory
  functions = "netlify/functions"

[[redirects]]
  # Route all traffic to the serverless API function
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"